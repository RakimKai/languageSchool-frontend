<div class="page-header">
  <h1>{{ isEditMode ? 'Edit Course' : 'New Course' }}</h1>
</div>

<!-- Loading -->
<div class="loading-container" *ngIf="isLoading">
  <mat-spinner></mat-spinner>
</div>

<!-- Error -->
<div class="error-container" *ngIf="errorMessage">
  <mat-icon>error</mat-icon>
  <span>{{ errorMessage }}</span>
</div>

<!-- Form -->
<mat-card *ngIf="!isLoading && !errorMessage">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <!-- Name -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Course Name</mat-label>
          <input matInput formControlName="name" placeholder="Enter course name">
          <mat-error *ngIf="form.get('name')?.invalid">
            {{ getErrorMessage('name') }}
          </mat-error>
        </mat-form-field>

        <!-- Category -->
        <mat-form-field appearance="outline">
          <mat-label>Category</mat-label>
          <mat-select formControlName="categoryId">
            <mat-option *ngFor="let cat of categories" [value]="cat.id">
              {{ cat.name }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('categoryId')?.invalid">
            Category is required
          </mat-error>
        </mat-form-field>

        <!-- Course Date -->
        <mat-form-field appearance="outline">
          <mat-label>Course Date</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="courseDate">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
          <mat-error *ngIf="form.get('courseDate')?.invalid">
            Date is required
          </mat-error>
        </mat-form-field>

        <!-- Professor Name -->
        <mat-form-field appearance="outline">
          <mat-label>Professor Name</mat-label>
          <input matInput formControlName="professorName" placeholder="Enter professor name">
        </mat-form-field>

        <!-- Course Type -->
        <mat-form-field appearance="outline">
          <mat-label>Course Type</mat-label>
          <input matInput formControlName="courseType" placeholder="e.g., Online, In-person">
        </mat-form-field>

        <!-- Number of Classes -->
        <mat-form-field appearance="outline">
          <mat-label>Number of Classes</mat-label>
          <input matInput type="number" formControlName="numberOfClasses" placeholder="Enter number">
        </mat-form-field>

        <!-- Duration in Hours -->
        <mat-form-field appearance="outline">
          <mat-label>Duration (hours)</mat-label>
          <input matInput type="number" formControlName="durationInHours" placeholder="Enter hours">
        </mat-form-field>

        <!-- Max Students -->
        <mat-form-field appearance="outline">
          <mat-label>Max Students</mat-label>
          <input matInput type="number" formControlName="maxStudents" placeholder="Enter max capacity">
        </mat-form-field>

        <!-- Price -->
        <mat-form-field appearance="outline">
          <mat-label>Price (KM)</mat-label>
          <input matInput type="number" formControlName="price" placeholder="Enter price">
          <span matSuffix>KM</span>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="4"
                    placeholder="Enter course description"></textarea>
        </mat-form-field>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button mat-button type="button" (click)="onCancel()">
          Cancel
        </button>
        <button mat-raised-button color="primary" type="submit" [disabled]="isSaving">
          <mat-spinner *ngIf="isSaving" diameter="20"></mat-spinner>
          <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }}</span>
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
