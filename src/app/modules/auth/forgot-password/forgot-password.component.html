<div class="auth-card" style="max-width: 420px; margin: 32px auto;">
  <h2>Zaboravljena lozinka</h2>
  <p>Unesite email vašeg naloga. Poslat ćemo vam link za reset lozinke.</p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" required />
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit"
            [disabled]="form.invalid || loading">
      {{ loading ? 'Šaljem...' : 'Pošalji link za reset' }}
    </button>
  </form>

  <p *ngIf="successMessage" style="color: green; margin-top: 16px;">{{ successMessage }}</p>
  <p *ngIf="errorMessage" style="color: #d32f2f; margin-top: 16px;">{{ errorMessage }}</p>

  <p style="margin-top: 16px;">
    <a routerLink="/auth/login">Nazad na prijavu</a>
  </p>
</div>
